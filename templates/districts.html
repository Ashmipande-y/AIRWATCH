<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AirWatch — All Districts</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&family=DM+Mono&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:#0d0f0e; --surface:rgba(255,255,255,0.04); --border:rgba(255,255,255,0.1);
      --text:#e8e6df; --muted:rgba(232,230,223,0.42);
      --mono:'DM Mono',monospace; --serif:'Playfair Display',Georgia,serif; --sans:'DM Sans',sans-serif;
      --good:#4ade80; --moderate:#fbbf24; --unhealthy:#fb923c; --hazardous:#f43f5e;
    }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--text); font-family:var(--sans); min-height:100vh; }

    .topbar { display:flex; align-items:center; justify-content:space-between; padding:16px 44px; border-bottom:1px solid var(--border); background:rgba(13,15,14,0.95); position:sticky; top:0; z-index:1000; }
    .topbar-brand { font-family:var(--serif); font-size:20px; color:#fff; text-decoration:none; }
    .topbar-nav { display:flex; gap:28px; }
    .topbar-nav a { font-family:var(--mono); font-size:11px; letter-spacing:0.14em; color:var(--muted); text-decoration:none; text-transform:uppercase; transition:color 0.2s; }
    .topbar-nav a:hover, .topbar-nav a.active { color:#fff; }

    .page-head { padding:36px 44px 28px; border-bottom:1px solid var(--border); display:flex; align-items:flex-end; justify-content:space-between; flex-wrap:wrap; gap:16px; }
    .page-tag { font-family:var(--mono); font-size:10px; letter-spacing:0.2em; color:var(--muted); text-transform:uppercase; margin-bottom:8px; }
    .page-title { font-family:var(--serif); font-size:clamp(28px,4vw,42px); font-weight:700; color:#fff; }

    .search-box { position:relative; width:100%; max-width:320px; }
    .search-input { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:4px; padding:10px 14px 10px 38px; color:#fff; font-family:var(--sans); font-size:14px; outline:none; transition:border-color 0.2s; }
    .search-input:focus { border-color:rgba(255,255,255,0.25); }
    .search-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--muted); pointer-events:none; }

    .page { max-width:1200px; margin:0 auto; padding:32px 44px 60px; }

    .table-card { background:var(--surface); border:1px solid var(--border); border-radius:6px; overflow:hidden; }
    table { width:100%; border-collapse:collapse; }
    th { text-align:left; padding:14px 20px; font-family:var(--mono); font-size:10px; letter-spacing:0.15em; color:var(--muted); text-transform:uppercase; border-bottom:1px solid var(--border); background:rgba(255,255,255,0.01); cursor:pointer; }
    th:hover { color:#fff; background:rgba(255,255,255,0.03); }
    th.sort-active { color:var(--good); }
    td { padding:14px 20px; font-size:14px; border-bottom:1px solid rgba(255,255,255,0.03); }
    tr:last-child td { border-bottom:none; }
    tr:hover td { background:rgba(255,255,255,0.01); }

    .aqi-badge { display:inline-block; padding:3px 10px; border-radius:3px; font-family:var(--mono); font-size:11px; font-weight:600; color:#fff; text-align:center; min-width:45px; }

    .footer { margin-top:38px; padding-top:18px; border-top:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
    .footer-name { font-family:var(--serif); font-size:13px; color:var(--muted); }
    .footer-note { font-family:var(--mono); font-size:10px; color:rgba(232,230,223,0.18); letter-spacing:0.1em; }

    @media(max-width:860px){ .page,.page-head{padding-left:20px;padding-right:20px;} .search-box{max-width:100%;} }
  </style>
</head>
<body>

<div class="topbar">
  <a class="topbar-brand" href="/">AirWatch</a>
  <nav class="topbar-nav">
    <a href="/">Dashboard</a>
    <a href="/map">Map</a>
    <a href="/analytics">Analytics</a>
    <a href="/districts" class="active">Districts</a>
    <a href="/health">Health</a>
    <a href="/about">About</a>
  </nav>
</div>

<div class="page-head">
  <div>
    <div class="page-tag">Real-time Data</div>
    <h1 class="page-title">District Status</h1>
  </div>
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" class="search-input" id="searchInput" placeholder="Search district..." oninput="filterTable()"/>
  </div>
</div>

<div class="page">
  <div class="table-card">
    <table id="districtTable">
      <thead>
        <tr>
          <th onclick="sortTable(0)">District</th>
          <th onclick="sortTable(1)">AQI</th>
          <th onclick="sortTable(2)">Status</th>
          <th onclick="sortTable(3)">PM2.5 (µg/m³)</th>
          <th onclick="sortTable(4)">CO₂ (ppm)</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <!-- Rows will be injected here -->
      </tbody>
    </table>
  </div>

  <div class="footer">
    <span class="footer-name">AirWatch</span>
    <span class="footer-note">District-wise real-time simulated data</span>
  </div>
</div>

<script>
  let districtData = [];

  function aqiColor(v){ return v>200?'#f43f5e':v>150?'#fb923c':v>100?'#fbbf24':'#4ade80'; }
  function aqiLabel(v){ return v>200?'Hazardous':v>150?'Unhealthy':v>100?'Moderate':'Good'; }

  async function loadData() {
    const res = await fetch('/api/districts');
    districtData = await res.json();
    renderTable(districtData);
  }

  function renderTable(data) {
    const body = document.getElementById('tableBody');
    body.innerHTML = data.map(d => `
      <tr>
        <td style="font-weight:500">${d.name}</td>
        <td><span class="aqi-badge" style="background:${aqiColor(d.aqi)}">${d.aqi}</span></td>
        <td style="color:${aqiColor(d.aqi)}">${aqiLabel(d.aqi)}</td>
        <td style="font-family:var(--mono);color:var(--muted)">${d.pm25}</td>
        <td style="font-family:var(--mono);color:var(--muted)">${d.co2}</td>
      </tr>
    `).join('');
  }

  function filterTable() {
    const term = document.getElementById('searchInput').value.toLowerCase();
    const filtered = districtData.filter(d => d.name.toLowerCase().includes(term));
    renderTable(filtered);
  }

  let sortDirections = [true, true, true, true, true];
  function sortTable(colIdx) {
    const keys = ['name', 'aqi', 'aqi', 'pm25', 'co2'];
    const key = keys[colIdx];
    const asc = sortDirections[colIdx];
    
    districtData.sort((a, b) => {
      let valA = a[key];
      let valB = b[key];
      if (typeof valA === 'string') {
        valA = valA.toLowerCase();
        valB = valB.toLowerCase();
      }
      if (valA < valB) return asc ? -1 : 1;
      if (valA > valB) return asc ? 1 : -1;
      return 0;
    });

    sortDirections[colIdx] = !asc;
    
    // Update header UI
    const headers = document.querySelectorAll('th');
    headers.forEach((h, idx) => {
      h.classList.remove('sort-active');
      if(idx === colIdx) h.classList.add('sort-active');
    });

    renderTable(districtData);
  }

  loadData();
</script>
</body>
</html>
